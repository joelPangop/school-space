name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: Abc123...
          MYSQL_DATABASE: studentdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
 

      - name: Build JAR
        working-directory: school-space-services
        run: mvn clean package -DskipTests
        
      - name: Build and run tests
        working-directory: school-space-services
        run: |
          chmod +x mvnw
          ./mvnw test -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1 \
            -Dspring.datasource.driver-class-name=org.h2.Driver \
            -Dspring.datasource.username=sa \
            -Dspring.datasource.password= \
            -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect \
            -Dspring.jpa.hibernate.ddl-auto=create-drop

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Make mvnw executable
        run: chmod +x ./school-space-services/mvnw

      - name: Build JAR file
        working-directory: ./school-space-services
        run: ./mvnw clean package -DskipTests

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./school-space-services
          file: ./school-space-services/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/schoolspaceservices:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./school-space-client
          file: ./school-space-client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/schoolspaceclient:latest
